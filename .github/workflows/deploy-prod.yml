name: Deploy Production Environment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy (main only)
        required: true
        default: main
        type: choice
        options:
          - main

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy_supabase_prod:
    name: Deploy Supabase Migrations (Prod)
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.PROD_SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD || secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Supabase secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${SUPABASE_ACCESS_TOKEN:-}" ]] || { echo "Missing secret: PROD_SUPABASE_ACCESS_TOKEN (or SUPABASE_ACCESS_TOKEN)"; exit 1; }
          [[ -n "${SUPABASE_DB_PASSWORD:-}" ]] || { echo "Missing secret: PROD_SUPABASE_DB_PASSWORD (or SUPABASE_DB_PASSWORD)"; exit 1; }
          [[ -n "${SUPABASE_PROJECT_REF:-}" ]] || { echo "Missing secret: PROD_SUPABASE_PROJECT_REF (or SUPABASE_PROJECT_REF)"; exit 1; }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

  deploy_vercel_prod:
    name: Deploy Vercel (Prod)
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs: [deploy_supabase_prod]
    env:
      VERCEL_TOKEN: ${{ secrets.PROD_VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.PROD_VERCEL_ORG_ID || secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PROD_VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
      HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Vercel secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${VERCEL_TOKEN:-}" ]] || { echo "Missing secret: PROD_VERCEL_TOKEN (or VERCEL_TOKEN)"; exit 1; }
          [[ -n "${VERCEL_ORG_ID:-}" ]] || { echo "Missing secret: PROD_VERCEL_ORG_ID (or VERCEL_ORG_ID)"; exit 1; }
          [[ -n "${VERCEL_PROJECT_ID:-}" ]] || { echo "Missing secret: PROD_VERCEL_PROJECT_ID (or VERCEL_PROJECT_ID)"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment configuration (production)
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build deployment artifacts
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Post-deploy health check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HEALTHCHECK_URL:-}" ]]; then
            echo "PROD_HEALTHCHECK_URL secret is not set."
            exit 1
          fi
          curl --fail --show-error --silent \
            --retry 8 \
            --retry-delay 5 \
            --retry-all-errors \
            "$HEALTHCHECK_URL"
