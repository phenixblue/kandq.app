name: Deploy Production Environment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy (main only)
        required: true
        default: main
        type: choice
        options:
          - main

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy_supabase_prod:
    name: Deploy Supabase Migrations (Prod)
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_SUPABASE_ACCESS_TOKEN: ${{ secrets.PROD_SUPABASE_ACCESS_TOKEN }}
      PROD_SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
      PROD_SUPABASE_PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Supabase credentials
        shell: bash
        run: |
          set -euo pipefail
          token="${PROD_SUPABASE_ACCESS_TOKEN:-}"
          password="${PROD_SUPABASE_DB_PASSWORD:-}"
          project_ref="${PROD_SUPABASE_PROJECT_REF:-}"

          [[ -n "$token" ]] || { echo "Missing environment secret: PROD_SUPABASE_ACCESS_TOKEN"; exit 1; }
          [[ -n "$password" ]] || { echo "Missing environment secret: PROD_SUPABASE_DB_PASSWORD"; exit 1; }
          [[ -n "$project_ref" ]] || { echo "Missing environment secret: PROD_SUPABASE_PROJECT_REF"; exit 1; }

          {
            echo "SUPABASE_ACCESS_TOKEN=$token"
            echo "SUPABASE_DB_PASSWORD=$password"
            echo "SUPABASE_PROJECT_REF=$project_ref"
          } >> "$GITHUB_ENV"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

  deploy_vercel_prod:
    name: Deploy Vercel (Prod)
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs: [deploy_supabase_prod]
    environment: production
    env:
      PROD_VERCEL_TOKEN: ${{ secrets.PROD_VERCEL_TOKEN }}
      PROD_VERCEL_ORG_ID: ${{ secrets.PROD_VERCEL_ORG_ID }}
      PROD_VERCEL_PROJECT_ID: ${{ secrets.PROD_VERCEL_PROJECT_ID }}
      HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Vercel credentials
        shell: bash
        run: |
          set -euo pipefail
          token="${PROD_VERCEL_TOKEN:-}"
          org_id="${PROD_VERCEL_ORG_ID:-}"
          project_id="${PROD_VERCEL_PROJECT_ID:-}"

          [[ -n "$token" ]] || { echo "Missing environment secret: PROD_VERCEL_TOKEN"; exit 1; }
          [[ -n "$org_id" ]] || { echo "Missing environment secret: PROD_VERCEL_ORG_ID"; exit 1; }
          [[ -n "$project_id" ]] || { echo "Missing environment secret: PROD_VERCEL_PROJECT_ID"; exit 1; }

          {
            echo "VERCEL_TOKEN=$token"
            echo "VERCEL_ORG_ID=$org_id"
            echo "VERCEL_PROJECT_ID=$project_id"
          } >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment configuration (production)
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build deployment artifacts
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Post-deploy health check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HEALTHCHECK_URL:-}" ]]; then
            echo "PROD_HEALTHCHECK_URL secret is not set."
            exit 1
          fi
          curl --fail --show-error --silent \
            --retry 8 \
            --retry-delay 5 \
            --retry-all-errors \
            "$HEALTHCHECK_URL"
